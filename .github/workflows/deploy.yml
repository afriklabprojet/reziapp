name: 🚀 Deploy — Production

on:
  push:
    branches: [main]
  workflow_dispatch:        # déclenchement manuel possible

concurrency:
  group: deploy-production
  cancel-in-progress: false # jamais annuler un deploy en cours

env:
  PHP_VERSION: '8.2'
  NODE_VERSION: '20'
  DEPLOY_PATH: /var/www/reziapp

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. CI — Tests & Build (réutilise les jobs existants)
  # ─────────────────────────────────────────────────────────────────────────────
  tests:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: rezi_test
        ports: ['3306:3306']
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, pdo_mysql, gd, zip
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare .env test
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=.*/DB_PORT=3306/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=rezi_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=secret/' .env

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test --stop-on-failure

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Build assets frontend
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build assets (production)
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: public/build/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Déploiement sur Hetzner via SSH
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy → reziapp.ci
    runs-on: ubuntu-latest
    needs: [tests, build]
    environment:
      name: production
      url: https://reziapp.ci

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: public/build/

      - name: Setup SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ed25519
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          echo "${{ secrets.SERVER_HOST }} ${{ secrets.SERVER_SSH_KNOWN_HOST }}" >> ~/.ssh/known_hosts

      - name: Mode maintenance ON
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            php artisan down --render="errors.503" --retry=60 || true

      - name: Sync code (rsync)
        run: |
          rsync -azP \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='storage/app/public/photos' \
            --exclude='.env' \
            --exclude='public/build' \
            --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Sync build assets
        run: |
          rsync -azP \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            public/build/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/public/build/

      - name: Post-deploy commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}

            # Dépendances PHP prod
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

            # Migrations
            php artisan migrate --force

            # Caches production
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # Permissions
            chown -R www-data:www-data storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            # Redémarrer queue
            php artisan queue:restart

            # Storage link
            php artisan storage:link 2>/dev/null || true

      - name: Mode maintenance OFF
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            php artisan up

      - name: Health check
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://reziapp.ci)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "302" ]; then
            echo "❌ Health check failed! Status: $STATUS"
            exit 1
          fi
          echo "✅ reziapp.ci répond correctement (HTTP $STATUS)"

      - name: Notify success
        if: success()
        run: echo "🎉 Deploy v$(git rev-parse --short HEAD) réussi → https://reziapp.ci"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            php artisan up || true
            echo "⚠️ Deploy échoué — app remise en ligne, vérifier les logs"
